#Nombre de la aplicación
spring.application.name=RadioAcademy

#Conexión a la base de datos
spring.datasource.url=jdbc:postgresql://localhost:5432/radio_db
spring.datasource.username=admin
spring.datasource.password=password123
spring.datasource.driver-class-name=org.postgresql.Driver


#Configuración de JPA/Hibernate
#update: Crea y actualiza las tablas según las entidades
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
# CONFIGURACIÓN DE SEGURIDAD (JWT)
# En producción, esto se sustituye por una variable de entorno real
security.jwt.secret-key=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
security.jwt.expiration-time=86400000
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
# Cierra la sesión de base de datos inmediatamente después del controlador
spring.jpa.open-in-view=false