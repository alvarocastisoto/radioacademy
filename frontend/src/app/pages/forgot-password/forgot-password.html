<div class="auth-wrapper">
  <div class="aurora-bg">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
    <div class="grid-overlay"></div>
  </div>

  <div class="auth-container">
    <div class="card glass-card auth-card">
      <div class="card-body p-4 p-md-5">
        <div class="text-center mb-4">
          <div class="icon-circle mb-3">
            <i class="bi bi-key-fill text-primary"></i>
          </div>
          <h2 class="fw-bold mb-2">Recuperar cuenta</h2>
          <p class="text-muted small mb-0">
            Introduce tu email y te enviaremos un enlace para restablecer tu contraseña.
          </p>
        </div>

        @if (message) {
          <div class="alert alert-success d-flex align-items-center small" role="alert">
            <i class="bi bi-check-circle-fill me-2"></i> {{ message }}
          </div>
        }
        @if (error) {
          <div class="alert alert-danger d-flex align-items-center small" role="alert">
            <i class="bi bi-exclamation-triangle-fill me-2"></i> {{ error }}
          </div>
        }

        <form [formGroup]="form" (ngSubmit)="onSubmit()">
          <div class="mb-4">
            <label class="form-label" for="email">Email asociado</label>
            <input
              id="email"
              type="email"
              class="form-control"
              formControlName="email"
              placeholder="nombre@email.com"
              [class.is-invalid]="form.get('email')?.invalid && form.get('email')?.touched"
            />
            @if (form.get('email')?.invalid && form.get('email')?.touched) {
              <div class="invalid-feedback">Por favor, introduce un email válido.</div>
            }
          </div>

          <div class="d-grid gap-3">
            <button
              type="submit"
              class="btn btn-primary btn-glow btn-lg"
              [disabled]="form.invalid || isLoading"
            >
              @if (isLoading) {
                <span class="spinner-border spinner-border-sm me-2"></span> Enviando...
              } @else {
                Enviar enlace
              }
            </button>

            <a routerLink="/auth/login" class="btn btn-glass btn-sm">
              <i class="bi bi-arrow-left me-2"></i> Volver al Login
            </a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
