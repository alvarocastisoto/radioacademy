<div class="auth-page">
  <div class="container py-4">
    <div class="row justify-content-center w-100">
      <div class="col-12 col-sm-11 col-md-8 col-lg-6 col-xl-5">
        <div class="card auth-card">
          <div class="card-body">
            <div class="text-center mb-4">
              <h3 class="fw-bold mb-1">Recuperar cuenta</h3>
              <p class="text-muted small">Introduce tu email para buscar tu cuenta.</p>
            </div>

            <div *ngIf="message" class="alert alert-success small">{{ message }}</div>
            <div *ngIf="error" class="alert alert-danger small">{{ error }}</div>

            <form [formGroup]="form" (ngSubmit)="onSubmit()">
              <div class="mb-4">
                <label class="form-label">Email</label>
                <input
                  type="email"
                  class="form-control"
                  formControlName="email"
                  placeholder="nombre@email.com"
                />
              </div>

              <div class="d-grid gap-2">
                <button
                  type="submit"
                  class="btn btn-primary"
                  [disabled]="form.invalid || isLoading"
                >
                  {{ isLoading ? 'Enviando...' : 'Enviar enlace' }}
                </button>

                <a routerLink="/auth/login" class="btn btn-light text-muted"> Volver al Login </a>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
