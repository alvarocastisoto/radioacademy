<div class="quiz-editor-page py-4 bg-light min-vh-100">
  <div class="container">
    
    <form [formGroup]="quizForm" (ngSubmit)="onSubmit()">

      <div class="d-flex justify-content-between align-items-center mb-4">
        <div class="d-flex align-items-center gap-3">
          <button type="button" class="btn btn-outline-secondary" routerLink="/admin">
            <i class="bi bi-arrow-left"></i> Volver
          </button>
          <h2 class="fw-bold m-0">Editor de Examen 📝</h2>
        </div>

        <button 
          type="submit" 
          class="btn btn-success btn-lg px-4 shadow-sm"
          [disabled]="quizForm.invalid || isSubmitting">
          @if (isSubmitting) {
            <span class="spinner-border spinner-border-sm me-2"></span> Guardando...
          } @else {
            <i class="bi bi-save me-2"></i> Guardar Examen
          }
        </button>
      </div>

      <div class="card shadow-sm border-0 mb-4">
        <div class="card-body p-4">
          <label class="form-label fw-bold text-uppercase small text-muted">Configuración General</label>
          <input 
            type="text" 
            class="form-control form-control-lg fw-bold" 
            formControlName="title"
            placeholder="Ej: Examen Final - Módulo 1: Java Básico"
            [class.is-invalid]="quizForm.get('title')?.invalid && quizForm.get('title')?.touched"
          >
          <div class="invalid-feedback">El título del examen es obligatorio.</div>
        </div>
      </div>

      <div formArrayName="questions">
        
        @for (questionCtrl of questionsArray.controls; track $index; let i = $index) {
          <div [formGroupName]="i" class="card shadow-sm border-0 mb-4 position-relative">
            
            <div class="card-header bg-white border-bottom-0 pt-4 px-4 d-flex justify-content-between align-items-start">
              <span class="badge bg-primary rounded-pill">Pregunta {{ i + 1 }}</span>
              
              <button 
                type="button" 
                class="btn btn-outline-danger btn-sm" 
                (click)="removeQuestion(i)"
                title="Eliminar pregunta">
                <i class="bi bi-trash"></i> Eliminar
              </button>
            </div>

            <div class="card-body p-4 pt-2">
              <div class="row g-3">
                <div class="col-md-9">
                  <label class="form-label">Enunciado</label>
                  <input 
                    type="text" 
                    class="form-control" 
                    formControlName="question" 
                    placeholder="Escribe la pregunta aquí..."
                  >
                </div>

                <div class="col-md-3">
                  <label class="form-label">Puntos</label>
                  <input 
                    type="number" 
                    class="form-control text-center" 
                    formControlName="points"
                    min="1"
                  >
                </div>
              </div>

              <div class="mt-4 ps-3 border-start border-3 border-light">
                <label class="form-label text-muted small fw-bold mb-3">OPCIONES DE RESPUESTA</label>

                <div formArrayName="options">
                  @for (optionCtrl of getOptionsArray(i).controls; track $index; let j = $index) {
                    <div [formGroupName]="j" class="input-group mb-2">
                      
                      <div class="input-group-text bg-white">
                        <input 
                          class="form-check-input mt-0" 
                          type="checkbox" 
                          formControlName="isCorrect"
                          title="Marcar como respuesta correcta"
                        >
                      </div>

                      <input 
                        type="text" 
                        class="form-control" 
                        formControlName="text" 
                        placeholder="Opción {{ j + 1 }}"
                        [class.text-success]="optionCtrl.get('isCorrect')?.value"
                        [class.fw-bold]="optionCtrl.get('isCorrect')?.value"
                      >

                      <button 
                        type="button" 
                        class="btn btn-outline-secondary" 
                        (click)="removeOption(i, j)"
                        [disabled]="getOptionsArray(i).length <= 2">
                        <i class="bi bi-x-lg"></i>
                      </button>
                    </div>
                  }
                </div>

                <button 
                  type="button" 
                  class="btn btn-sm btn-link text-decoration-none mt-2 ps-0"
                  (click)="addOption(i)">
                  + Añadir otra opción
                </button>
              </div>

            </div>
          </div>
        }
      </div>

<div 
  class="text-center py-4 border-2 border-dashed rounded-3 bg-white" 
  style="border-style: dashed !important; border-color: #dee2e6;"
  (click)="addQuestion()" 
>
  <button type="button" class="btn btn-primary px-4 rounded-pill">
    <i class="bi bi-plus-lg me-2"></i> Añadir Nueva Pregunta
  </button>
</div>

    </form>
  </div>
</div>
