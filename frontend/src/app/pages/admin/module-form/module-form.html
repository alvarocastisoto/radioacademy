<div class="container mt-5">
  <div class="card shadow-sm col-md-6 mx-auto">
    <div class="card-body p-4">
      <h3 class="mb-4">Nuevo Módulo</h3>

      <form [formGroup]="form" (ngSubmit)="onSubmit()">
        <div class="mb-3">
          <label class="form-label">Título del Módulo</label>
          <input
            type="text"
            formControlName="title"
            class="form-control"
            placeholder="Ej: Introducción a la Anatomía"
          />
        </div>

        <div class="mb-3">
          <label class="form-label">Orden</label>
          <input type="number" formControlName="orderIndex" class="form-control" />
        </div>

        <div class="d-flex justify-content-end gap-2">
          <a
            [routerLink]="['/admin/courses', courseId, 'content']"
            class="btn btn-outline-secondary"
            >Cancelar</a
          >
          <button type="submit" class="btn btn-primary" [disabled]="form.invalid">
            Guardar Módulo
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
