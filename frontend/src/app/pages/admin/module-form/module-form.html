<div class="admin-wrapper">
  <div class="aurora-bg">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
    <div class="grid-overlay"></div>
  </div>

  <div class="content-relative">
    <div class="ra-container">
      <div class="page-head text-center mb-5">
        <h2 class="fw-bold display-6 mb-2 text-main">📦 Nuevo Módulo</h2>
        <p class="text-muted lead mb-0">Crea una sección organizativa para tu curso.</p>
      </div>

      <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6 col-xl-5">
          <div class="card glass-card">
            <div class="card-body p-4 p-md-5">
              <form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>
                <div class="mb-4">
                  <label class="form-label">Título del Módulo</label>
                  <input
                    type="text"
                    formControlName="title"
                    class="form-control form-control-lg"
                    placeholder="Ej: Anatomía Básica"
                    [class.is-invalid]="form.get('title')?.invalid && form.get('title')?.touched"
                  />
                  @if (form.get('title')?.invalid && form.get('title')?.touched) {
                    <div class="invalid-feedback">El título es obligatorio.</div>
                  }
                </div>

                <div class="mb-5">
                  <label class="form-label">Orden de aparición</label>
                  <div class="input-group">
                    <span class="input-group-text bg-transparent border-end-0 text-muted">#</span>
                    <input
                      type="number"
                      formControlName="orderIndex"
                      class="form-control border-start-0 ps-0"
                      placeholder="1"
                    />
                  </div>
                  <div class="form-text text-muted small mt-1">
                    Define la posición de este módulo en el temario.
                  </div>
                </div>

                <div class="d-grid gap-3">
                  <button type="submit" class="btn btn-glow btn-lg" [disabled]="form.invalid">
                    Guardar Módulo
                  </button>

                  <a
                    [routerLink]="['/admin/courses', courseId, 'content']"
                    class="btn btn-glass text-center"
                  >
                    Cancelar
                  </a>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
