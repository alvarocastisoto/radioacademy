<div class="container mt-5">
  <div class="card shadow-sm col-md-8 mx-auto">
    <div class="card-body p-4">
      <h3 class="mb-4">Nueva Lección de Vídeo 🎥</h3>

      <form [formGroup]="form" (ngSubmit)="onSubmit()">
        <div class="mb-3">
          <label class="form-label">Título de la Lección</label>
          <input
            type="text"
            formControlName="title"
            class="form-control"
            placeholder="Ej: Cómo funcionan los Rayos X"
          />
        </div>

        <div class="mb-3">
          <label class="form-label">Enlace de Vídeo (YouTube/Vimeo)</label>
          <input
            type="text"
            formControlName="videoUrl"
            class="form-control"
            placeholder="https://youtube.com/watch?v=..."
          />
          <div class="form-text">Copia y pega la URL directa del navegador.</div>
        </div>

        <div class="mb-3">
          <label class="form-label">Orden</label>
          <input type="number" formControlName="orderIndex" class="form-control" />
        </div>

        <div class="d-flex justify-content-end gap-2">
          <button type="button" (click)="goBack()" class="btn btn-outline-secondary">
            Cancelar
          </button>
          <button type="submit" class="btn btn-primary" [disabled]="form.invalid">
            Guardar Lección
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
