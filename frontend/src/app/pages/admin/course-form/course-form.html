<div class="course-new-page">
  <div class="container-fluid px-3 px-lg-5">
    <div class="course-new-wrap">
      <div class="row justify-content-center">
        <div class="col-12 col-md-10 col-lg-8 col-xl-7">
          <div class="card form-card">
            <div class="card-header form-header">
              <h2 class="fw-bold m-0">Nuevo Curso</h2>
            </div>

            <div class="card-body p-4">
              <form [formGroup]="courseForm" (ngSubmit)="onSubmit()">
                <div class="mb-4">
                  <label class="form-label mb-2">Portada del Curso</label>

                  <div
                    class="cover-upload-area position-relative rounded-3 overflow-hidden border"
                    [class.border-primary]="isUploading"
                    style="height: 220px; background: #f3f4f6"
                  >
                    @if (coverPreview) {
                    <img [src]="coverPreview" class="w-100 h-100 object-fit-cover" />
                    } @else {
                    <div
                      class="d-flex flex-column align-items-center justify-content-center h-100 text-muted"
                    >
                      <i class="bi bi-image display-4 mb-2 opacity-25"></i>
                      <span class="small fw-bold">Subir Portada</span>
                    </div>
                    } @if (isUploading) {
                    <div
                      class="position-absolute top-0 start-0 w-100 h-100 bg-white bg-opacity-75 d-flex align-items-center justify-content-center"
                    >
                      <div class="spinner-border text-primary" role="status"></div>
                    </div>
                    }

                    <input
                      type="file"
                      class="position-absolute top-0 start-0 w-100 h-100 opacity-0 cursor-pointer"
                      accept="image/*"
                      (change)="onFileSelected($event)"
                    />
                  </div>
                  <div class="form-text text-end mt-1">Recomendado: 1280x720px (JPG/PNG)</div>
                </div>
                <div class="mb-3">
                  <label class="form-label" for="title">Título del Curso</label>
                  <input
                    id="title"
                    type="text"
                    class="form-control"
                    formControlName="title"
                    placeholder="Ej: OPE Enfermería 2025"
                  />
                </div>

                <div class="mb-3">
                  <label class="form-label" for="description">Descripción Corta</label>
                  <textarea
                    id="description"
                    class="form-control"
                    rows="3"
                    formControlName="description"
                    placeholder="Resumen del contenido..."
                  ></textarea>
                </div>

                <div class="row g-3">
                  <div class="col-12 col-md-4">
                    <label class="form-label" for="price">Precio (€)</label>
                    <input id="price" type="number" class="form-control" formControlName="price" />
                  </div>

                  <div class="col-12 col-md-4">
                    <label class="form-label" for="hours">Horas Lectivas</label>
                    <input id="hours" type="number" class="form-control" formControlName="hours" />
                  </div>

                  <div class="col-12 col-md-4">
                    <label class="form-label" for="level">Nivel</label>
                    <select id="level" class="form-select" formControlName="level">
                      <option value="BEGINNER">Principiante</option>
                      <option value="INTERMEDIATE">Intermedio</option>
                      <option value="ADVANCED">Avanzado</option>
                    </select>
                  </div>
                </div>

                <div class="d-flex justify-content-end gap-2 mt-4">
                  <a routerLink="/admin" class="btn btn-outline-secondary">Cancelar</a>
                  <button
                    type="submit"
                    class="btn btn-primary px-4"
                    [disabled]="courseForm.invalid || isUploading"
                  >
                    Guardar Curso
                  </button>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
