<div class="admin-wrapper">
  <div class="aurora-bg">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
    <div class="grid-overlay"></div>
  </div>

  <div class="content-relative">
    <div class="ra-container">
      <div class="page-head text-center mb-5">
        <h2 class="fw-bold display-6 mb-2 text-main">🚀 Nuevo Curso</h2>
        <p class="text-muted lead mb-0">Crea un nuevo programa formativo desde cero.</p>
      </div>

      <div class="row justify-content-center">
        <div class="col-md-10 col-lg-8 col-xl-6">
          <div class="card glass-card">
            <div class="card-body p-4 p-md-5">
              <form [formGroup]="courseForm" (ngSubmit)="onSubmit()">
                <div class="mb-4">
                  <label class="form-label">Título del Curso</label>
                  <input
                    type="text"
                    class="form-control form-control-lg"
                    formControlName="title"
                    placeholder="Ej: OPE Enfermería 2025"
                  />
                </div>

                <div class="mb-4">
                  <label class="form-label">Descripción</label>
                  <textarea
                    class="form-control"
                    formControlName="description"
                    rows="4"
                    placeholder="Resumen del contenido y objetivos..."
                  ></textarea>
                </div>

                <div class="row g-3 mb-4">
                  <div class="col-md-4">
                    <label class="form-label">Precio (€)</label>
                    <div class="input-group">
                      <span class="input-group-text bg-transparent border-end-0 text-muted">€</span>
                      <input
                        type="number"
                        class="form-control border-start-0 ps-0"
                        formControlName="price"
                      />
                    </div>
                  </div>
                  <div class="col-md-4">
                    <label class="form-label">Horas</label>
                    <div class="input-group">
                      <span class="input-group-text bg-transparent border-end-0 text-muted"
                        ><i class="bi bi-clock"></i
                      ></span>
                      <input
                        type="number"
                        class="form-control border-start-0 ps-0"
                        formControlName="hours"
                      />
                    </div>
                  </div>
                  <div class="col-md-4">
                    <label class="form-label">Nivel</label>
                    <select class="form-select" formControlName="level">
                      <option value="BEGINNER">Principiante</option>
                      <option value="INTERMEDIATE">Intermedio</option>
                      <option value="ADVANCED">Avanzado</option>
                    </select>
                  </div>
                </div>

                <div class="mb-5">
                  <label class="form-label mb-3">Portada del Curso</label>

                  <div
                    class="upload-area p-4 text-center rounded-4 border-dashed mb-3 position-relative"
                    [class.has-image]="coverPreview"
                  >
                    @if (coverPreview) {
                      <div class="position-relative d-inline-block">
                        <img
                          [src]="coverPreview"
                          alt="Preview"
                          class="preview-img shadow-sm rounded-3"
                        />
                        <div
                          class="overlay-hover rounded-3 d-flex align-items-center justify-content-center"
                        >
                          <span class="text-white fw-bold small">Cambiar imagen</span>
                        </div>
                      </div>
                    } @else {
                      <div class="py-4 text-muted opacity-50">
                        <i class="bi bi-cloud-arrow-up display-4 mb-2 d-block"></i>
                        <small class="fw-bold">Subir Portada</small>
                      </div>
                    }

                    @if (isUploading) {
                      <div
                        class="position-absolute top-0 start-0 w-100 h-100 bg-white bg-opacity-75 d-flex align-items-center justify-content-center rounded-4"
                      >
                        <div class="spinner-border text-primary" role="status"></div>
                      </div>
                    }

                    <input
                      type="file"
                      class="position-absolute top-0 start-0 w-100 h-100 opacity-0 cursor-pointer"
                      (change)="onFileSelected($event)"
                      accept="image/*"
                    />
                  </div>

                  <div class="form-text text-muted text-center small">
                    Recomendado: 1280x720px (JPG/PNG). Máx 2MB.
                  </div>
                </div>

                <div class="d-grid gap-3">
                  <button
                    type="submit"
                    class="btn btn-glow btn-lg"
                    [disabled]="courseForm.invalid || isUploading"
                  >
                    @if (isUploading) {
                      <span class="spinner-border spinner-border-sm me-2"></span> Subiendo...
                    } @else {
                      Crear Curso
                    }
                  </button>

                  <a routerLink="/admin" class="btn btn-glass text-center"> Cancelar </a>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
