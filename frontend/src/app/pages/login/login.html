<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-5 col-lg-4">
      <div class="card shadow-lg border-0 rounded-3">
        <div class="card-body p-5">
          
          <div class="text-center mb-4">
            <h2 class="text-primary fw-bold">Bienvenido</h2>
            <p class="text-muted">Inicia sesión en RadioAcademy</p>
          </div>
          
          <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
            
            <div class="mb-3">
              <label class="form-label fw-bold">Email</label>
              <input type="email" class="form-control form-control-lg" formControlName="email" placeholder="nombre@email.com">
            </div>

            <div class="mb-4">
              <label class="form-label fw-bold">Contraseña</label>
              <input type="password" class="form-control form-control-lg" formControlName="password">
            </div>

            <div class="d-grid gap-2">
              <button type="submit" class="btn btn-primary btn-lg" [disabled]="loginForm.invalid">
                Entrar
              </button>
            </div>

            <div class="text-center mt-4">
              <small>¿No tienes cuenta? <a routerLink="/register" class="text-decoration-none">Regístrate gratis</a></small>
            </div>

          </form>
        </div>
      </div>
    </div>
  </div>
</div>
