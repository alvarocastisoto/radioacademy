<div class="auth-page">
  <div class="container py-4">
    <div class="row justify-content-center w-100">
      <div class="col-12 col-sm-11 col-md-8 col-lg-6 col-xl-5">
        <div class="card auth-card">
          <div class="card-body">
            <div class="text-center mb-4">
              <h2 class="fw-bold mb-1">Bienvenido</h2>
              <p class="text-muted mb-0">Inicia sesión en RadioAcademy</p>
            </div>

            <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" novalidate>
              <div class="mb-3">
                <label class="form-label" for="email">Email</label>
                <input
                  id="email"
                  type="email"
                  class="form-control"
                  formControlName="email"
                  autocomplete="email"
                  placeholder="nombre@email.com"
                />
              </div>

              <div class="mb-4">
                <label class="form-label" for="password">Contraseña</label>
                <input
                  id="password"
                  type="password"
                  class="form-control"
                  formControlName="password"
                  autocomplete="current-password"
                  placeholder="••••••••"
                />
              </div>

              <div class="d-grid">
                <button type="submit" class="btn btn-primary btn-lg" [disabled]="loginForm.invalid">
                  Entrar
                </button>
              </div>

              <div class="text-center mt-4">
                <small>
                  ¿No tienes cuenta?
                  <a routerLink="/register">Regístrate gratis</a>
                </small>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
