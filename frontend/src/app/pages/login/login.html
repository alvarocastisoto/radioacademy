<div class="auth-wrapper">
  <div class="aurora-bg">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
    <div class="grid-overlay"></div>
  </div>

  <div class="auth-container">
    <div class="card glass-card auth-card">
      <div class="card-body p-4 p-md-5">
        <div class="text-center mb-4">
          <div class="brand-icon mb-3">☢️</div>
          <h2 class="fw-bold mb-1">Bienvenido</h2>
          <p class="text-muted mb-0">Inicia sesión en tu cuenta</p>
        </div>

        <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" novalidate>
          <div class="mb-3">
            <label class="form-label" for="email">Email</label>
            <div class="input-group-clean">
              <input
                id="email"
                type="email"
                class="form-control"
                formControlName="email"
                autocomplete="email"
                placeholder="nombre@email.com"
                [class.is-invalid]="
                  loginForm.get('email')?.invalid && loginForm.get('email')?.touched
                "
              />
            </div>
          </div>

          <div class="mb-4">
            <div class="d-flex justify-content-between align-items-center mb-1">
              <label class="form-label mb-0" for="password">Contraseña</label>
              <a
                routerLink="/forgot-password"
                class="small text-primary text-decoration-none fw-semibold"
              >
                ¿Olvidaste la contraseña?
              </a>
            </div>
            <div class="input-group-clean">
              <input
                id="password"
                type="password"
                class="form-control"
                formControlName="password"
                autocomplete="current-password"
                placeholder="••••••••"
              />
            </div>
          </div>

          <div class="d-grid">
            <button
              type="submit"
              class="btn btn-primary btn-glow btn-lg"
              [disabled]="loginForm.invalid"
            >
              Entrar
            </button>
          </div>

          <div class="text-center mt-4">
            <p class="small text-muted mb-0">
              ¿No tienes cuenta?
              <a routerLink="/register" class="text-primary fw-bold text-decoration-none ms-1"
                >Regístrate gratis</a
              >
            </p>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
