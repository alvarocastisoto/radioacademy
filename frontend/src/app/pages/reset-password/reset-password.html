<div class="auth-page">
  <div class="container py-4">
    <div class="row justify-content-center w-100">
      <div class="col-12 col-sm-11 col-md-8 col-lg-6 col-xl-5">
        <div class="card auth-card">
          <div class="card-body">
            <div class="text-center mb-4">
              <h3 class="fw-bold">Nueva Contraseña</h3>
              <p class="text-muted small">Escribe una contraseña segura para tu cuenta.</p>
            </div>

            <div *ngIf="success" class="alert alert-success">
              ¡Contraseña cambiada con éxito! Redirigiendo...
            </div>

            <div *ngIf="error" class="alert alert-danger">
              {{ error }}
            </div>

            <form *ngIf="!success" [formGroup]="form" (ngSubmit)="onSubmit()">
              <div class="mb-4">
                <label class="form-label" for="password">Nueva Contraseña</label>

                <input
                  id="password"
                  type="password"
                  class="form-control"
                  formControlName="password"
                  placeholder="••••••••"
                  autocomplete="new-password"
                  [class.is-invalid]="isFieldInvalid('password')"
                />

                <div
                  *ngIf="isFieldInvalid('password')"
                  class="password-requirements mt-2 small text-danger"
                >
                  <div *ngIf="password?.hasError('required')">• La contraseña es obligatoria.</div>

                  <div *ngIf="password?.hasError('minlength')">• Mínimo 8 caracteres.</div>

                  <div *ngIf="password?.hasError('pattern')">
                    <div class="lh-sm">
                      • Debe contener al menos:
                      <ul class="mb-0 ps-3 mt-1">
                        <li>Una mayúscula y una minúscula</li>
                        <li>Un número</li>
                        <li>Un símbolo (@#$%^&+=!._*-)</li>
                      </ul>
                    </div>
                  </div>
                </div>
              </div>

              <div class="d-grid">
                <button type="submit" class="btn btn-primary" [disabled]="form.invalid">
                  Confirmar Cambio
                </button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
