<div class="status-wrapper">
  <div class="aurora-bg">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
    <div class="grid-overlay"></div>
  </div>

  <div class="status-container">
    <div class="card glass-card">
      <div class="card-body text-center p-5">
        <div class="icon-wrapper mb-4">
          @if (isConfirmed) {
            <div class="icon-circle success-circle animate-pop">
              <i class="bi bi-check-lg"></i>
            </div>
          } @else {
            <div class="icon-circle processing-circle">
              <div class="spinner-border text-primary" role="status"></div>
            </div>
          }
        </div>

        <h1 class="fw-bold mb-3 text-main">
          {{ isConfirmed ? '¡Pago Exitoso!' : 'Procesando...' }}
        </h1>

        <p class="text-muted lead mb-4">
          {{ status }}
        </p>

        <div class="d-flex justify-content-center">
          @if (isConfirmed) {
            <a routerLink="/courses" class="btn btn-glow px-5 py-3">
              <i class="bi bi-journal-bookmark-fill me-2"></i> Ir a mis Cursos
            </a>
          } @else {
            <button class="btn btn-glass disabled" disabled>
              <span class="spinner-border spinner-border-sm me-2"></span> Esperando confirmación...
            </button>
          }
        </div>
      </div>
    </div>
  </div>
</div>
