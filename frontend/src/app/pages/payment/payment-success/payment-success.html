<div class="container text-center mt-5">
  <div class="card p-5 shadow-sm border-success">
    <div class="card-body">
      <h1 class="display-1" [class.text-success]="isConfirmed" [class.text-muted]="!isConfirmed">
        <i
          class="bi"
          [class.bi-check-circle-fill]="isConfirmed"
          [class.bi-hourglass-split]="!isConfirmed"
        ></i>
      </h1>

      <h2 class="mt-3">{{ isConfirmed ? '¡Pago Exitoso!' : 'Procesando...' }}</h2>
      <p class="lead">{{ status }}</p>

      <a *ngIf="isConfirmed" routerLink="/courses" class="btn btn-primary mt-3">
        Ir a mis Cursos
      </a>
    </div>
  </div>
</div>
